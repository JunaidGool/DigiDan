<svg xmlns="http://www.w3.org/2000/svg" width="440" height="600" viewBox="0 0 440 600" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif">
  <rect width="440" height="600" fill="#FAF9F6"/>

  <!-- panel -->
  <g transform="translate(30,20)">
    <rect x="0" y="0" width="380" height="560" rx="18" fill="#FFFFFF" stroke="#E5E3DC"/>

    <!-- header -->
    <circle cx="36" cy="40" r="17" fill="#E1F5EE"/>
    <svg x="24" y="28" width="24" height="26" viewBox="-74 -91 148 165">
      <polygon points="-68,34 0,68 0,34 -68,0" fill="#147A5A"/>
      <polygon points="68,34 0,68 0,34 68,0" fill="#1D9E75"/>
      <polygon points="0,-34 68,0 0,34 -68,0" fill="#5DCAA5"/>
      <polygon points="0,0 34,17 34,-51 0,-68" fill="#C67C10"/>
      <polygon points="68,0 34,17 34,-51 68,-68" fill="#EF9F27"/>
      <polygon points="34,-85 68,-68 34,-51 0,-68" fill="#FAC775"/>
      <polygon points="-68,0 -34,17 -34,-17 -68,-34" fill="#A8431F"/>
      <polygon points="0,0 -34,17 -34,-17 0,-34" fill="#D85A30"/>
      <polygon points="-34,-51 0,-34 -34,-17 -68,-34" fill="#F0997B"/>
    </svg>
    <text x="66" y="45" font-size="16" font-weight="500" fill="#26261F">DigiDan guide</text>
    <text x="352" y="46" font-size="20" fill="#726F63">&#215;</text>
    <line x1="0" y1="70" x2="380" y2="70" stroke="#E5E3DC"/>

    <!-- disclosure -->
    <rect x="0" y="70" width="380" height="34" fill="#FAF9F6"/>
    <text x="18" y="91" font-size="11.5" fill="#726F63">A guided assistant, not a person. I hand anything specific to an engineer.</text>
    <line x1="0" y1="104" x2="380" y2="104" stroke="#E5E3DC"/>

    <!-- transcript -->
    <!-- bot bubble -->
    <rect x="18" y="122" width="300" height="40" rx="14" fill="#E1F5EE"/>
    <text x="34" y="139" font-size="13" fill="#085041">Hi — I&#8217;m the DigiDan guide.</text>
    <text x="34" y="156" font-size="13" fill="#085041">What are you working on?</text>

    <!-- user bubble -->
    <rect x="176" y="176" width="186" height="30" rx="14" fill="#26261F"/>
    <text x="192" y="195" font-size="13" fill="#FFFFFF">Fintech / banking software</text>

    <!-- bot bubble -->
    <rect x="18" y="220" width="322" height="94" rx="14" fill="#E1F5EE"/>
    <text x="34" y="240" font-size="13" fill="#085041"><tspan x="34" dy="0">Financial-grade is our core. We build</tspan><tspan x="34" dy="17">terminal-to-backend transaction flows —</tspan><tspan x="34" dy="17">authorisation, clearing, reversals — with</tspan><tspan x="34" dy="17">ISO 8583 / ISO 20022 messaging.</tspan></text>

    <!-- choices -->
    <line x1="0" y1="470" x2="380" y2="470" stroke="#E5E3DC"/>
    <g font-size="12.5">
      <rect x="18" y="486" width="182" height="30" rx="15" fill="#1D9E75"/>
      <text x="34" y="505" fill="#FFFFFF">See release-assurance work</text>

      <rect x="210" y="486" width="118" height="30" rx="15" fill="#FFFFFF" stroke="#E5E3DC"/>
      <text x="226" y="505" fill="#26261F">How we deliver</text>

      <rect x="18" y="524" width="150" height="30" rx="15" fill="#1D9E75"/>
      <text x="34" y="543" fill="#FFFFFF">Talk to an engineer</text>

      <rect x="178" y="524" width="130" height="30" rx="15" fill="#FFFFFF" stroke="#E5E3DC"/>
      <text x="194" y="543" fill="#26261F">&#8592; Something else</text>
    </g>
  </g>
</svg>
